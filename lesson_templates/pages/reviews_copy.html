
{% extends 'base.html' %}

{% block head %}
    <title>Home page | CODE BLOG</title>
    <link rel="stylesheet" href="/static/admin_add.css">
    <link rel="stylesheet" href="/static/reviews.css">
{% endblock %}

{% block main %}
<div class="main">

    {% for alert in get_flashed_messages() %}
    <div class="alert" style="background-color: {{ alert[1] }}">
      <span class="closebtn" onclick="this.parentElement.style.display='none';">×</span>
      {{ alert[0] }}
    </div>
    {% endfor %}

    <div class="form">
        <form action="/reviews" method="post">
            <ul>
                <li><label for="">Enter your name: </label><input type="text" name="author"></li>
                <li><label for="">Enter the text of your review: </label><textarea type="text" cols="40" rows="5" name="text"></textarea></li>
                <li><label for="">Enter your email: </label><input type="email" name="email"></li>
                <li><button type="submit">CONFIRM</button></li>
            </ul>
        </form>
    </div>

    <div class="reviews">
        <ul>
            <li>
                <div class="head-reviews">
                    <h3>Dima</h3>
                    <p>29.10.2023</p>
                </div>
                <p>Lorem ipsum</p>
            </li>
        </ul>
    </div>
</div>
{% endblock %}
